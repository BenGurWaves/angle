<!DOCTYPE html>
<!-- Engine: PASSED | All Signatures: YES | Anti-Patterns: 0 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angle // Watch Movement Lift Angle Database</title>
<meta name="description" content="Watch Movement Lift Angle Database — a precision goniometer for watchmakers. Instantly read the correct lift angle for ETA, Sellita, Seiko, Miyota, Rolex, Omega and 50+ mechanical calibers before setting amplitude on a timegrapher.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" crossorigin>
<style>
:root{
  --noir:#050505;
  --noir-2:#0b0a09;
  --copper:#B87C5A;
  --copper-dim:rgba(184,124,90,.20);
  --copper-line:rgba(184,124,90,.12);
  --parchment:#E8D5BC;
  --parchment-dim:rgba(232,213,188,.46);
  --ray:#F4E4C8;
  --ease:cubic-bezier(.16,1,.3,1);
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{height:100%}

body{
  font-family:'Syne',sans-serif;
  background:var(--noir);
  color:var(--parchment);
  overflow:hidden;
  position:relative;
  cursor:none;
  -webkit-font-smoothing:antialiased;
}

/* ---------- LIVING TEXTURE ---------- */
.tex-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--copper-line) 1px,transparent 1px),
    linear-gradient(90deg,var(--copper-line) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(circle at 50% 58%,#000 0%,rgba(0,0,0,.35) 55%,transparent 88%);
  -webkit-mask-image:radial-gradient(circle at 50% 58%,#000 0%,rgba(0,0,0,.35) 55%,transparent 88%);
}
.tex-sheen{
  position:fixed;inset:-20%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at var(--mx,50%) var(--my,40%),rgba(184,124,90,.10),transparent 60%);
  transition:background-position .6s var(--ease);
  animation:breathe 14s ease-in-out infinite;
}
.tex-noise{
  position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
}
@keyframes breathe{0%,100%{opacity:.7}50%{opacity:1}}

/* ---------- CURSOR (caliper crosshair) ---------- */
.cur{position:fixed;top:0;left:0;z-index:90;pointer-events:none;width:42px;height:42px;margin:-21px 0 0 -21px;
  transition:width .35s var(--ease),height .35s var(--ease),margin .35s var(--ease),opacity .3s}
.cur::before,.cur::after{content:'';position:absolute;background:var(--copper)}
.cur::before{left:50%;top:0;width:1px;height:100%;transform:translateX(-.5px)}
.cur::after{top:50%;left:0;height:1px;width:100%;transform:translateY(-.5px)}
.cur i{position:absolute;inset:0;border:1px solid var(--copper-dim);border-radius:50%}
.cur.hot{width:64px;height:64px;margin:-32px 0 0 -32px}
.cur.hot i{border-color:var(--copper)}

/* ---------- LOADER ---------- */
.loader{position:fixed;inset:0;z-index:120;background:var(--noir);display:flex;align-items:center;justify-content:center;
  transition:opacity 1s var(--ease),visibility 1s}
.loader.done{opacity:0;visibility:hidden}
.loader svg{width:min(60vw,340px);height:auto;overflow:visible}
.loader .ld-num{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.34em;
  fill:var(--copper);text-transform:uppercase}

/* ---------- FRAME / MARGIN META ---------- */
.mark{position:fixed;z-index:40;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.24em;
  text-transform:uppercase;color:var(--parchment-dim)}
.mark .dot{color:var(--copper)}
.m-tl{top:30px;left:34px}
.m-tl b{font-family:'Syne';font-weight:800;letter-spacing:.04em;font-size:16px;color:var(--parchment);text-transform:lowercase}
.m-tr{top:32px;right:34px;text-align:right}
.m-br{bottom:30px;right:34px;text-align:right}

/* vertical SEO serial — native technical label */
.seo-rail{position:fixed;left:14px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;
  z-index:40;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.32em;text-transform:uppercase;
  color:rgba(184,124,90,.34);user-select:none;pointer-events:none}

/* ---------- STAGE ---------- */
.stage{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:96px 24px 132px}

.dial-wrap{position:relative;width:min(86vw,560px);aspect-ratio:1/.62;display:flex;align-items:flex-end;justify-content:center}
.dial{width:100%;height:auto;overflow:visible}

.tick{stroke:rgba(184,124,90,.30);stroke-width:1}
.tick.major{stroke:rgba(184,124,90,.62)}
.tick-on{stroke:var(--ray)!important;transition:stroke .25s}
.arc-track{fill:none;stroke:rgba(184,124,90,.14);stroke-width:1}
.arc-live{fill:none;stroke:var(--ray);stroke-width:2.4;stroke-linecap:round;
  filter:drop-shadow(0 0 9px rgba(244,228,200,.55))}
.radius{stroke:var(--ray);stroke-width:1.4;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(244,228,200,.5))}
.pivot{fill:var(--copper)}
.pivot-ring{fill:none;stroke:var(--copper);stroke-width:1;opacity:.5}

/* center readout */
.readout{position:absolute;left:50%;bottom:13%;transform:translateX(-50%);text-align:center;pointer-events:none;width:100%}
.cal{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.26em;text-transform:uppercase;
  color:var(--parchment);min-height:16px}
.deg{font-family:'Syne';font-weight:800;font-size:clamp(64px,12.5vw,126px);line-height:.84;letter-spacing:-.03em;
  color:var(--ray);display:inline-flex;align-items:flex-start}
.deg .o{font-weight:500;font-size:.42em;color:var(--copper);transform:translateY(.18em);margin-left:.04em}
.note{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--parchment-dim);min-height:14px;margin-top:4px}

/* ---------- SEARCH ---------- */
.console{position:fixed;left:50%;bottom:54px;transform:translateX(-50%);z-index:50;width:min(90vw,460px)}
.field{position:relative;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--copper-dim);padding:0 4px 12px}
.field .q{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--copper);text-transform:uppercase}
.field input{flex:1;background:none;border:none;outline:none;color:var(--parchment);
  font-family:'Syne';font-weight:500;font-size:18px;letter-spacing:.01em;cursor:none}
.field input::placeholder{color:rgba(232,213,188,.3);font-weight:400}
.field .count{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--parchment-dim)}

.suggest{position:absolute;left:0;right:0;bottom:calc(100% + 14px);
  max-height:38vh;overflow-y:auto;display:flex;flex-direction:column;gap:1px;
  opacity:0;transform:translateY(8px);pointer-events:none;transition:opacity .4s var(--ease),transform .4s var(--ease)}
.suggest.show{opacity:1;transform:translateY(0);pointer-events:auto}
.suggest::-webkit-scrollbar{width:0}
.row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;padding:11px 6px;
  border-bottom:1px solid rgba(184,124,90,.07);cursor:none;transition:padding .35s var(--ease),background .35s}
.row:hover,.row.act{padding-left:18px;background:linear-gradient(90deg,rgba(184,124,90,.08),transparent)}
.row .rc{font-family:'Syne';font-weight:500;font-size:15px;color:var(--parchment)}
.row .rn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--parchment-dim);margin-top:2px}
.row .ra{font-family:'Space Mono',monospace;font-size:14px;letter-spacing:.06em;color:var(--copper);white-space:nowrap}
.row.empty{justify-content:center;color:var(--parchment-dim);font-family:'Space Mono',monospace;font-size:11px;
  letter-spacing:.16em;text-transform:uppercase;cursor:none}
.row.empty:hover{padding-left:6px;background:none}

.copy{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:50;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.24em;text-transform:uppercase;
  color:var(--parchment-dim);background:none;border:none;cursor:none;
  opacity:0;transition:opacity .4s,color .25s}
.copy.show{opacity:1}
.copy:hover{color:var(--copper)}
.copy.copied{color:var(--ray)}

/* ---------- RESPONSIVE ---------- */
@media (max-width:560px){
  body{cursor:auto}
  .cur{display:none}
  .field input,.field .q,.row,.copy{cursor:pointer}
  .m-tr{display:none}
  .seo-rail{font-size:8px;left:8px}
  .dial-wrap{width:94vw}
  .deg{font-size:clamp(64px,22vw,120px)}
  .console{bottom:42px;width:90vw}
  .m-tl{top:22px;left:20px}
  .m-br{bottom:64px;right:20px}
}
@media (prefers-reduced-motion:reduce){
  .tex-sheen{animation:none}
  *{transition-duration:.001s!important}
}
</style>
</head>
<body>

<!-- living texture -->
<div class="tex-grid"></div>
<div class="tex-sheen" id="sheen"></div>
<svg class="tex-noise"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>

<!-- loader -->
<div class="loader" id="loader">
  <svg viewBox="0 0 200 130">
    <!-- baseline -->
    <line x1="40" y1="110" x2="160" y2="110" stroke="rgba(184,124,90,.4)" stroke-width="1"/>
    <!-- track -->
    <path id="ldTrack" d="" class="arc-track"/>
    <!-- drawing arc -->
    <path id="ldArc" d="" class="arc-live"/>
    <!-- radius -->
    <line id="ldRad" x1="100" y1="110" x2="160" y2="110" class="radius"/>
    <circle cx="100" cy="110" r="3" class="pivot"/>
    <text id="ldNum" x="100" y="64" text-anchor="middle" class="ld-num">000°</text>
  </svg>
</div>

<!-- margin meta -->
<div class="mark m-tl"><b>angle</b></div>
<div class="mark m-tr">GONIOMETER <span class="dot">/</span> VOL.04</div>
<div class="mark m-br" id="coord">52.00°N <span class="dot">·</span> CAL —</div>
<div class="seo-rail">SYSTEM.REF // WATCH MOVEMENT LIFT ANGLE DATABASE</div>

<!-- stage -->
<div class="stage">
  <div class="dial-wrap">
    <svg class="dial" id="dial" viewBox="0 0 560 348" aria-hidden="true"></svg>
    <div class="readout">
      <div class="cal" id="calName">balance · impulse arc</div>
      <div class="deg"><span id="degNum">52</span><span class="o">°</span></div>
      <div class="note" id="noteTxt">the most common horological lift angle</div>
    </div>
  </div>
</div>

<!-- console -->
<div class="console">
  <div class="suggest" id="suggest"></div>
  <div class="field">
    <span class="q">cal</span>
    <input id="search" type="text" autocomplete="off" spellcheck="false" placeholder="type a caliber — 2824, 4R36, 3135…">
    <span class="count" id="count">52°</span>
  </div>
</div>
<button class="copy" id="copy">copy lift angle</button>

<!-- cursor -->
<div class="cur" id="cur"><i></i></div>

<script>
const MOVEMENTS=[
 {c:"ETA 2824-2",a:50,n:"the workhorse swiss automatic"},
 {c:"ETA 2892-A2",a:50,n:"thin high-grade automatic"},
 {c:"ETA 7750 Valjoux",a:52,n:"the chronograph standard"},
 {c:"ETA 6497",a:53,n:"unitas pocket-watch movement"},
 {c:"ETA 6498",a:53,n:"small-seconds pocket calibre"},
 {c:"ETA 7001 Peseux",a:68,n:"thin hand-wound calibre"},
 {c:"ETA 2801-2",a:50,n:"hand-wound 2824 base"},
 {c:"Sellita SW200-1",a:50,n:"the 2824 alternative"},
 {c:"Sellita SW300-1",a:50,n:"the 2892 alternative"},
 {c:"Sellita SW500",a:52,n:"7750-pattern chronograph"},
 {c:"Seiko NH35 / 4R36",a:53,n:"the diver's workhorse"},
 {c:"Seiko 6R15",a:53,n:"higher-grade automatic"},
 {c:"Seiko 6R35",a:53,n:"long-power-reserve automatic"},
 {c:"Seiko 7S26",a:52,n:"the entry automatic"},
 {c:"Seiko 9S65",a:51,n:"grand seiko mechanical"},
 {c:"Seiko 8L35",a:52,n:"marinemaster movement"},
 {c:"Miyota 8215",a:52,n:"citizen entry automatic"},
 {c:"Miyota 9015",a:52,n:"slim high-beat automatic"},
 {c:"Miyota 821A",a:52,n:"hacking-free workhorse"},
 {c:"Rolex 3135",a:52,n:"the submariner's heart"},
 {c:"Rolex 3235",a:52,n:"chronergy escapement"},
 {c:"Rolex 3186",a:52,n:"gmt-master ii calibre"},
 {c:"Rolex 4130",a:52,n:"daytona chronograph"},
 {c:"Rolex 2236",a:52,n:"syloxi hairspring, ladies"},
 {c:"Omega 1120",a:52,n:"2892-based automatic"},
 {c:"Omega 2500",a:52,n:"first co-axial calibre"},
 {c:"Omega 8500",a:52,n:"in-house co-axial"},
 {c:"Omega 8800",a:52,n:"master chronometer"},
 {c:"Omega 1861",a:52,n:"the moonwatch calibre"},
 {c:"Tudor MT5602",a:52,n:"black bay in-house"},
 {c:"Tudor MT5612",a:52,n:"date in-house calibre"},
 {c:"Patek Philippe 324",a:52,n:"nautilus automatic"},
 {c:"Patek Philippe 215",a:52,n:"calatrava hand-wound"},
 {c:"Audemars Piguet 3120",a:52,n:"royal oak automatic"},
 {c:"Audemars Piguet 2121",a:52,n:"ultra-thin automatic"},
 {c:"Vacheron 2450",a:52,n:"patrimony automatic"},
 {c:"Vacheron 1326",a:52,n:"overseas base calibre"},
 {c:"Jaeger 899",a:52,n:"master control automatic"},
 {c:"Jaeger 822",a:52,n:"reverso hand-wound"},
 {c:"Cartier 1904-PS",a:52,n:"in-house automatic"},
 {c:"IWC 52010",a:52,n:"pellaton automatic"},
 {c:"IWC 69355",a:52,n:"in-house chronograph"},
 {c:"Panerai P.9000",a:52,n:"in-house automatic"},
 {c:"Panerai OP XI",a:50,n:"eta-based, luminor"},
 {c:"Breitling B01",a:52,n:"in-house chronograph"},
 {c:"Zenith El Primero 400",a:52,n:"high-beat 36,000 vph"},
 {c:"A. Lange L951",a:52,n:"datograph chronograph"},
 {c:"Glashütte 36",a:52,n:"senator automatic"},
 {c:"Nomos Alpha",a:52,n:"hand-wound in-house"},
 {c:"Nomos DUW 3001",a:52,n:"neomatik ultra-thin"},
 {c:"Hamilton H-10",a:52,n:"powermatic 80"},
 {c:"Tissot Powermatic 80",a:52,n:"long-reserve eta base"},
 {c:"Orient F6922",a:52,n:"in-house automatic"},
 {c:"Citizen 9015",a:52,n:"miyota high-grade"},
 {c:"Unitas 6325",a:53,n:"vintage pocket calibre"}
];

/* ---------- DIAL GEOMETRY ---------- */
const NS="http://www.w3.org/2000/svg";
const dial=document.getElementById('dial');
const CX=280, CY=312, R=250;          // pivot + radius (viewBox 560x348)
const A_MIN=0, A_MAX=180;             // full protractor crown
// angle measured up from the right-hand baseline (0° = pointing right/+x, sweeping CCW upward)
const rad=d=>d*Math.PI/180;
const pt=(deg)=>({x:CX+R*Math.cos(rad(deg)), y:CY-R*Math.sin(rad(deg))});

function arcPath(d0,d1,r){
  const p0={x:CX+r*Math.cos(rad(d0)),y:CY-r*Math.sin(rad(d0))};
  const p1={x:CX+r*Math.cos(rad(d1)),y:CY-r*Math.sin(rad(d1))};
  const large = (d1-d0)>180?1:0;
  // sweep flag 0 -> CCW in SVG (because y is down)
  return `M ${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A ${r} ${r} 0 ${large} 0 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`;
}

function buildDial(){
  // baseline
  const base=document.createElementNS(NS,'line');
  base.setAttribute('x1',CX-R-8);base.setAttribute('y1',CY);
  base.setAttribute('x2',CX+R+8);base.setAttribute('y2',CY);
  base.setAttribute('stroke','rgba(184,124,90,.35)');base.setAttribute('stroke-width','1');
  dial.appendChild(base);

  // graduation ticks every 1°, majors every 5°
  for(let d=A_MIN; d<=A_MAX; d+=2){
    const major=(d%10===0);
    const inner = major? R-20 : R-11;
    const a=document.createElementNS(NS,'line');
    const p1={x:CX+inner*Math.cos(rad(d)),y:CY-inner*Math.sin(rad(d))};
    const p2={x:CX+R*Math.cos(rad(d)),y:CY-R*Math.sin(rad(d))};
    a.setAttribute('x1',p1.x.toFixed(2));a.setAttribute('y1',p1.y.toFixed(2));
    a.setAttribute('x2',p2.x.toFixed(2));a.setAttribute('y2',p2.y.toFixed(2));
    a.setAttribute('class','tick'+(major?' major':''));
    a.dataset.deg=d;
    dial.appendChild(a);
    if(major){
      const t=document.createElementNS(NS,'text');
      const tp={x:CX+(R-34)*Math.cos(rad(d)),y:CY-(R-34)*Math.sin(rad(d))};
      t.setAttribute('x',tp.x.toFixed(2));t.setAttribute('y',(tp.y+3).toFixed(2));
      t.setAttribute('text-anchor','middle');
      t.setAttribute('fill','rgba(232,213,188,.4)');
      t.setAttribute('font-family','Space Mono, monospace');
      t.setAttribute('font-size','9');t.setAttribute('letter-spacing','1');
      t.textContent=d;
      dial.appendChild(t);
    }
  }
  // arc track
  const track=document.createElementNS(NS,'path');
  track.setAttribute('d',arcPath(A_MIN,A_MAX,R-6));
  track.setAttribute('class','arc-track');
  dial.appendChild(track);

  // live arc + radius (built last so they sit on top)
  liveArc=document.createElementNS(NS,'path');liveArc.setAttribute('class','arc-live');dial.appendChild(liveArc);
  radius=document.createElementNS(NS,'line');radius.setAttribute('class','radius');
  radius.setAttribute('x1',CX);radius.setAttribute('y1',CY);dial.appendChild(radius);
  const ring=document.createElementNS(NS,'circle');
  ring.setAttribute('cx',CX);ring.setAttribute('cy',CY);ring.setAttribute('r','9');ring.setAttribute('class','pivot-ring');dial.appendChild(ring);
  const piv=document.createElementNS(NS,'circle');
  piv.setAttribute('cx',CX);piv.setAttribute('cy',CY);piv.setAttribute('r','3.4');piv.setAttribute('class','pivot');dial.appendChild(piv);
}
let liveArc,radius;

/* ---------- INSCRIBE AN ANGLE ---------- */
let cur=52, curTarget=52, animFrame;
const degNum=document.getElementById('degNum');
const calName=document.getElementById('calName');
const noteTxt=document.getElementById('noteTxt');
const coord=document.getElementById('coord');
const ticks=()=>dial.querySelectorAll('.tick');

function drawAt(val){
  // baseline starts at A_MIN; arc fills from A_MIN to val
  const v=Math.max(A_MIN,Math.min(A_MAX,val));
  liveArc.setAttribute('d',arcPath(A_MIN,v,R-6));
  const tip=pt(v);
  radius.setAttribute('x2',tip.x.toFixed(2));radius.setAttribute('y2',tip.y.toFixed(2));
  // illuminate ticks under the arc
  ticks().forEach(t=>{
    const d=+t.dataset.deg;
    t.classList.toggle('tick-on', d<=v+0.5);
  });
}

function tweenTo(val,name,note){
  curTarget=val;
  if(name!==undefined){
    calName.textContent=name;
    noteTxt.textContent=note||'';
    coord.innerHTML=val.toFixed(2)+'°N <span class="dot">·</span> '+(name.split(' ')[0]||'CAL').toUpperCase();
  }
  cancelAnimationFrame(animFrame);
  const start=cur, t0=performance.now(), dur=820;
  const ease=t=>1-Math.pow(1-t,3);
  (function step(now){
    const t=Math.min(1,(now-t0)/dur);
    cur=start+(curTarget-start)*ease(t);
    degNum.textContent=Math.round(cur);
    drawAt(cur);
    if(t<1) animFrame=requestAnimationFrame(step);
    else{cur=curTarget;degNum.textContent=Math.round(cur);drawAt(cur);}
  })(t0);
}

/* ---------- SEARCH ---------- */
const search=document.getElementById('search');
const suggest=document.getElementById('suggest');
const count=document.getElementById('count');
const copyBtn=document.getElementById('copy');
let selected=null;

function render(list){
  if(!list.length){
    suggest.innerHTML='<div class="row empty">caliber not found</div>';
    return;
  }
  suggest.innerHTML=list.slice(0,40).map((m,i)=>`
    <div class="row" data-i="${MOVEMENTS.indexOf(m)}">
      <div><div class="rc">${m.c}</div><div class="rn">${m.n}</div></div>
      <div class="ra">${m.a}°</div>
    </div>`).join('');
}

function choose(m){
  selected=m;
  tweenTo(m.a,m.c,m.n);
  count.textContent=m.a+'°';
  copyBtn.classList.add('show');
  suggest.classList.remove('show');
}

search.addEventListener('input',e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){suggest.classList.remove('show');return;}
  const list=MOVEMENTS.filter(m=>m.c.toLowerCase().includes(q)||String(m.a).includes(q)||m.n.toLowerCase().includes(q));
  render(list);
  suggest.classList.add('show');
});
search.addEventListener('focus',()=>{if(search.value.trim()){suggest.classList.add('show');}});

suggest.addEventListener('click',e=>{
  const row=e.target.closest('.row[data-i]');
  if(!row)return;
  choose(MOVEMENTS[+row.dataset.i]);
  search.value=MOVEMENTS[+row.dataset.i].c;
});

// keyboard navigation
search.addEventListener('keydown',e=>{
  const rows=[...suggest.querySelectorAll('.row[data-i]')];
  if(!rows.length)return;
  let idx=rows.findIndex(r=>r.classList.contains('act'));
  if(e.key==='ArrowDown'){e.preventDefault();idx=Math.min(rows.length-1,idx+1);}
  else if(e.key==='ArrowUp'){e.preventDefault();idx=Math.max(0,idx-1);}
  else if(e.key==='Enter'){if(idx>=0){const m=MOVEMENTS[+rows[idx].dataset.i];choose(m);search.value=m.c;}return;}
  else return;
  rows.forEach(r=>r.classList.remove('act'));
  if(rows[idx]){rows[idx].classList.add('act');rows[idx].scrollIntoView({block:'nearest'});}
});

copyBtn.addEventListener('click',()=>{
  if(!selected)return;
  navigator.clipboard?.writeText(String(selected.a));
  copyBtn.textContent='copied · '+selected.a+'°';
  copyBtn.classList.add('copied');
  setTimeout(()=>{copyBtn.textContent='copy lift angle';copyBtn.classList.remove('copied');},1500);
});

/* ---------- CUSTOM CURSOR ---------- */
const curEl=document.getElementById('cur');
const sheen=document.getElementById('sheen');
let mx=innerWidth/2,my=innerHeight/2,cxp=mx,cyp=my;
addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  sheen.style.setProperty('--mx',(mx/innerWidth*100)+'%');
  sheen.style.setProperty('--my',(my/innerHeight*100)+'%');
});
(function follow(){
  cxp+=(mx-cxp)*.22;cyp+=(my-cyp)*.22;
  curEl.style.transform=`translate(${cxp}px,${cyp}px)`;
  requestAnimationFrame(follow);
})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('.row,input,button,a')) curEl.classList.add('hot');
  else curEl.classList.remove('hot');
});

/* ---------- LOADER (arc draws 0 -> 52) ---------- */
function runLoader(){
  const lc=130, lr=72, lpx=100, lpy=110;          // loader viewBox 200x130
  const lpt=(deg,r)=>({x:lpx+r*Math.cos(rad(deg)),y:lpy-r*Math.sin(rad(deg))});
  const lArc=(d0,d1,r)=>{
    const p0=lpt(d0,r),p1=lpt(d1,r);const large=(d1-d0)>180?1:0;
    return `M ${p0.x.toFixed(2)} ${p0.y.toFixed(2)} A ${r} ${r} 0 ${large} 0 ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`;
  };
  document.getElementById('ldTrack').setAttribute('d',lArc(0,90,lr));
  const arc=document.getElementById('ldArc');
  const rad2=document.getElementById('ldRad');
  const num=document.getElementById('ldNum');
  const t0=performance.now(),dur=1300,ease=t=>1-Math.pow(1-t,3);
  (function step(now){
    const t=Math.min(1,(now-t0)/dur);const v=52*ease(t);
    arc.setAttribute('d',lArc(0,v,lr));
    const tip=lpt(v,lr);
    rad2.setAttribute('x2',tip.x.toFixed(2));rad2.setAttribute('y2',tip.y.toFixed(2));
    num.textContent=String(Math.round(v)).padStart(3,'0')+'°';
    if(t<1)requestAnimationFrame(step);
    else setTimeout(()=>{
      document.getElementById('loader').classList.add('done');
      tweenTo(52,'balance · impulse arc','the most common horological lift angle');
    },360);
  })(t0);
}

/* ---------- INIT ---------- */
buildDial();
drawAt(52);
degNum.textContent='52';
if(matchMedia('(prefers-reduced-motion:reduce)').matches){
  document.getElementById('loader').classList.add('done');
}else{
  runLoader();
}
</script>
